<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBMS Week 1 MCQ Test | Gazi University IE</title>
  <link rel="icon" type="image/png" href="../../assets/gazi-university-logo-en.png" />
  <style>
    :root {
      --gazi-red: #c8102e;
      --gazi-deep-red: #9f0f25;
      --gazi-navy: #003366;
      --ink: #1a2a3a;
      --line: #d1dbe6;
      --panel: #ffffff;
      --ok: #1f7a3e;
      --bad: #a0142a;
      --soft-ok: #e8f7ee;
      --soft-bad: #ffecef;
      --soft-neutral: #f6f9fd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans", "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(0, 51, 102, 0.14), transparent 32%),
        radial-gradient(circle at 92% 12%, rgba(200, 16, 46, 0.14), transparent 34%),
        linear-gradient(170deg, #f8fbff 0%, #f2f7fc 58%, #edf3fa 100%);
      min-height: 100vh;
    }

    .site-header {
      background: linear-gradient(108deg, var(--gazi-red), var(--gazi-navy));
      color: #fff;
      padding: 1rem clamp(1rem, 4vw, 3.5rem);
      border-bottom: 4px solid #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .brand-wrap { display: flex; align-items: center; gap: 0.85rem; }

    .brand-logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.92);
      padding: 4px;
    }

    .brand-top,
    .term-note,
    .brand-main { margin: 0; }

    .brand-main {
      margin-top: 0.15rem;
      font-size: clamp(1.05rem, 2.4vw, 1.7rem);
      font-weight: 700;
    }

    .page-wrap {
      width: min(1100px, 92%);
      margin: 1.25rem auto 2rem;
      display: grid;
      gap: 1rem;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 22px rgba(0, 51, 102, 0.08);
    }

    .stats-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      padding: 0.95rem 1rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 0.6rem;
      width: min(680px, 100%);
    }

    .stat {
      border: 1px solid #d6e2f0;
      border-radius: 10px;
      background: #f8fbff;
      padding: 0.58rem 0.66rem;
      text-align: center;
    }

    .stat .label {
      display: block;
      font-size: 0.78rem;
      color: #4f5c6d;
      margin-bottom: 0.2rem;
    }

    .stat .value {
      font-weight: 700;
      font-size: 1.08rem;
      color: var(--gazi-navy);
    }

    .actions { display: flex; gap: 0.55rem; flex-wrap: wrap; }

    button,
    .back-link {
      border: 1px solid transparent;
      border-radius: 9px;
      padding: 0.56rem 0.78rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.92rem;
    }

    .btn-reset { background: var(--gazi-red); color: #fff; }
    .btn-reset:hover { background: var(--gazi-deep-red); }

    .back-link {
      background: #eaf2fb;
      color: var(--gazi-navy);
      border-color: #cad9ea;
      display: inline-flex;
      align-items: center;
    }

    .intro { padding: 1rem; line-height: 1.45; }
    .intro p { margin: 0; }

    .quiz-list {
      padding: 0.2rem 0.8rem 0.9rem;
      display: grid;
      gap: 0.8rem;
    }

    .question-card {
      border: 1px solid #dce6f2;
      border-radius: 12px;
      background: #fbfdff;
      padding: 0.85rem;
    }

    .q-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.8rem;
      margin-bottom: 0.62rem;
    }

    .q-text { margin: 0; font-weight: 700; line-height: 1.35; }

    .btn-reveal {
      background: #eff5fc;
      color: var(--gazi-navy);
      border-color: #c8d9eb;
      white-space: nowrap;
      font-weight: 600;
    }

    .opt-list {
      display: grid;
      gap: 0.42rem;
      margin-bottom: 0.58rem;
    }

    .opt {
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
      border: 1px solid #dce6f2;
      background: #fff;
      border-radius: 9px;
      padding: 0.46rem 0.56rem;
    }

    .opt input { margin-top: 0.2rem; }
    .opt.correct-opt { border-color: #8bc8a2; background: #f1fbf5; }
    .opt.wrong-opt { border-color: #e8a3b0; background: #fff4f6; }

    .feedback,
    .answer-box {
      border: 1px solid #dbe7f4;
      border-radius: 9px;
      padding: 0.5rem 0.62rem;
      background: var(--soft-neutral);
      font-size: 0.92rem;
      line-height: 1.42;
      display: none;
      margin-top: 0.52rem;
    }

    .feedback.show,
    .answer-box.show { display: block; }

    .feedback.good {
      background: var(--soft-ok);
      border-color: #a9d7b9;
      color: var(--ok);
      font-weight: 600;
    }

    .feedback.bad {
      background: var(--soft-bad);
      border-color: #e9b4bf;
      color: var(--bad);
      font-weight: 600;
    }

    .answer-box b { color: var(--gazi-navy); }
    @media (max-width: 720px) {
      .stat-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .q-head { flex-direction: column; }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="brand-wrap">
      <img class="brand-logo" src="../../assets/gazi-university-logo-en.png" alt="Gazi University logo" />
      <div>
        <p class="brand-top">Gazi University • Department of Industrial Engineering</p>
        <h1 class="brand-main">IE326 Week 1 MCQ Test</h1>
      </div>
    </div>
    <p class="term-note">Database Management Systems</p>
  </header>

  <main class="page-wrap">
    <section class="panel stats-panel">
      <div class="stat-grid">
        <div class="stat"><span class="label">Questions</span><span class="value" id="total-count">12</span></div>
        <div class="stat"><span class="label">Correct</span><span class="value" id="correct-count">0</span></div>
        <div class="stat"><span class="label">Wrong</span><span class="value" id="wrong-count">0</span></div>
        <div class="stat"><span class="label">Score (0-100)</span><span class="value" id="score-count">0</span></div>
      </div>
      <div class="actions">
        <button id="reset-btn" class="btn-reset" type="button">Reset Test</button>
        <a class="back-link" href="../index.html">Back to DBMS Page</a>
      </div>
    </section>

    <section class="panel intro">
      <p>
        This MCQ test is based on <b>dbms/slides/week1.pdf</b>. Use <b>Show Answer</b> to reveal the answer key and
        explanation.
      </p>
    </section>

    <section class="panel">
      <div class="quiz-list" id="quiz-list"></div>
    </section>
  </main>

  <script>
    const questions = [
      {
        id: 1,
        q: "Which description best matches the lecture's definition of a DBMS?",
        options: [
          "A collection of unrelated text files",
          "A set of programs for interrelated data",
          "A device used only for network routing",
          "A spreadsheet with no shared access"
        ],
        answer: 1,
        why: "The Week 1 lecture defines a DBMS as interrelated data plus programs that access it in a convenient and efficient environment.",
        slide: 8
      },
      {
        id: 2,
        q: "Which issue is explicitly listed as a weakness of early file-based systems?",
        options: [
          "Automatic query optimization",
          "Data redundancy and inconsistency",
          "Built-in concurrency control",
          "Centralized metadata management"
        ],
        answer: 1,
        why: "The early database systems slide states that file systems lead to data redundancy and inconsistency.",
        slide: 12
      },
      {
        id: 3,
        q: "In the fund-transfer example, atomicity means that the transfer should:",
        options: [
          "Either complete fully or not occur",
          "Update only one account at a time",
          "Always require manual verification",
          "Be stored in separate file systems"
        ],
        answer: 0,
        why: "The lecture explains atomicity with a transfer that must either complete entirely or not happen at all.",
        slide: 13
      },
      {
        id: 4,
        q: "A major purpose of a database system is to provide users with:",
        options: [
          "Direct access to disk blocks",
          "An abstract view of the data",
          "A fixed hardware platform",
          "Only network-level services"
        ],
        answer: 1,
        why: "The view-of-data slide says database systems give users an abstract view of the data.",
        slide: 16
      },
      {
        id: 5,
        q: "Which data model is identified as mainly being used for database design?",
        options: [
          "Hierarchical model",
          "Network model",
          "Entity-Relationship model",
          "Magnetic tape model"
        ],
        answer: 2,
        why: "The data models slide notes that the Entity-Relationship model is mainly used for database design.",
        slide: 17
      },
      {
        id: 6,
        q: "According to the lecture, the relational model stores data in:",
        options: [
          "Graphs",
          "Tables",
          "Message queues",
          "Binary trees"
        ],
        answer: 1,
        why: "The relational model slide states that all data is stored in various tables.",
        slide: 18
      },
      {
        id: 7,
        q: "Which schema describes how the data is stored physically?",
        options: [
          "Logical schema",
          "External schema",
          "Physical schema",
          "Query schema"
        ],
        answer: 2,
        why: "The schemas slide defines the physical schema as the overall physical structure of the database.",
        slide: 20
      },
      {
        id: 8,
        q: "The data dictionary is described as storing:",
        options: [
          "Metadata about the database",
          "Only backup transaction logs",
          "Only user interface templates",
          "Compiled host-language programs"
        ],
        answer: 0,
        why: "The DDL slide says the data dictionary stores metadata, including schema-related information.",
        slide: 21
      },
      {
        id: 9,
        q: "Which statement about DML is correct in Week 1?",
        options: [
          "DML is used only for defining schema",
          "DML is also known as query language",
          "DML replaces the storage manager",
          "DML is limited to operating systems"
        ],
        answer: 1,
        why: "The DML slide explicitly says that DML is also known as query language.",
        slide: 22
      },
      {
        id: 10,
        q: "Declarative DML requires the user to specify:",
        options: [
          "How the blocks are fetched",
          "Which optimization path is used",
          "What data are needed",
          "Which index must be created"
        ],
        answer: 2,
        why: "The lecture says declarative DML specifies what data are needed without explaining how to get them.",
        slide: 23
      },
      {
        id: 11,
        q: "The storage manager provides the interface between:",
        options: [
          "Low-level stored data and applications",
          "Only the browser and the network",
          "Only the printer and report files",
          "Physical memory and display adapters"
        ],
        answer: 0,
        why: "The storage manager slide defines it as the interface between low-level data storage and application programs or queries.",
        slide: 27
      },
      {
        id: 12,
        q: "Which component helps keep the database in a consistent state despite failures?",
        options: [
          "Query evaluation engine",
          "Transaction-management component",
          "Forms interface",
          "Report generator"
        ],
        answer: 1,
        why: "The transaction-management slide says this component keeps the database consistent despite system and transaction failures.",
        slide: 31
      }
    ];

    const quizList = document.getElementById("quiz-list");
    const totalCount = document.getElementById("total-count");
    const correctCount = document.getElementById("correct-count");
    const wrongCount = document.getElementById("wrong-count");
    const scoreCount = document.getElementById("score-count");
    const resetBtn = document.getElementById("reset-btn");

    const state = { selections: {} };

    function renderQuiz() {
      totalCount.textContent = String(questions.length);
      quizList.innerHTML = "";

      questions.forEach((item, idx) => {
        const card = document.createElement("article");
        card.className = "question-card";
        card.dataset.qid = String(item.id);

        const head = document.createElement("div");
        head.className = "q-head";

        const qText = document.createElement("p");
        qText.className = "q-text";
        qText.textContent = `${idx + 1}. ${item.q}`;

        const revealBtn = document.createElement("button");
        revealBtn.type = "button";
        revealBtn.className = "btn-reveal";
        revealBtn.textContent = "Show Answer";

        head.appendChild(qText);
        head.appendChild(revealBtn);

        const optList = document.createElement("div");
        optList.className = "opt-list";

        item.options.forEach((optText, optIdx) => {
          const optionLabel = document.createElement("label");
          optionLabel.className = "opt";

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = `q-${item.id}`;
          radio.value = String(optIdx);

          const txt = document.createElement("span");
          txt.textContent = optText;

          optionLabel.appendChild(radio);
          optionLabel.appendChild(txt);
          optList.appendChild(optionLabel);
        });

        const feedback = document.createElement("div");
        feedback.className = "feedback";

        const answerBox = document.createElement("div");
        answerBox.className = "answer-box";

        revealBtn.addEventListener("click", () => {
          const correctText = item.options[item.answer];
          answerBox.innerHTML = `<b>Correct Answer:</b> ${correctText}<br><b>Why:</b> ${item.why}<br><b>Slide Reference:</b> Week1 PDF - Slide ${item.slide}`;
          answerBox.classList.add("show");
        });

        optList.addEventListener("change", (e) => {
          const target = e.target;
          if (!(target instanceof HTMLInputElement) || target.type !== "radio") return;

          const selected = Number(target.value);
          state.selections[item.id] = selected;
          updateQuestionVisual(item.id);
          updateStats();
        });

        card.appendChild(head);
        card.appendChild(optList);
        card.appendChild(feedback);
        card.appendChild(answerBox);
        quizList.appendChild(card);
      });

      updateStats();
    }

    function updateQuestionVisual(questionId) {
      const item = questions.find((q) => q.id === questionId);
      const card = quizList.querySelector(`[data-qid="${questionId}"]`);
      if (!item || !card) return;

      const selected = state.selections[questionId];
      const labels = Array.from(card.querySelectorAll(".opt"));
      const feedback = card.querySelector(".feedback");

      labels.forEach((label, idx) => {
        label.classList.remove("correct-opt", "wrong-opt");
        if (selected === idx) {
          if (idx === item.answer) label.classList.add("correct-opt");
          else label.classList.add("wrong-opt");
        }
      });

      if (!(feedback instanceof HTMLElement)) return;

      if (selected === undefined) {
        feedback.className = "feedback";
        feedback.textContent = "";
        return;
      }

      if (selected === item.answer) {
        feedback.className = "feedback show good";
        feedback.textContent = `Correct. (Slide ${item.slide})`;
      } else {
        feedback.className = "feedback show bad";
        feedback.textContent = `Wrong. Correct option is "${item.options[item.answer]}". (Slide ${item.slide})`;
      }
    }

    function updateStats() {
      let correct = 0;
      let wrong = 0;

      questions.forEach((item) => {
        const selected = state.selections[item.id];
        if (selected === undefined) return;
        if (selected === item.answer) correct += 1;
        else wrong += 1;
      });

      const score = Math.round((correct / questions.length) * 100);
      correctCount.textContent = String(correct);
      wrongCount.textContent = String(wrong);
      scoreCount.textContent = String(score);
    }

    function resetQuiz() {
      state.selections = {};
      quizList.querySelectorAll("input[type='radio']").forEach((el) => { el.checked = false; });
      quizList.querySelectorAll(".opt").forEach((el) => { el.classList.remove("correct-opt", "wrong-opt"); });
      quizList.querySelectorAll(".feedback").forEach((el) => { el.className = "feedback"; el.textContent = ""; });
      quizList.querySelectorAll(".answer-box").forEach((el) => { el.classList.remove("show"); el.textContent = ""; });
      updateStats();
    }

    resetBtn.addEventListener("click", resetQuiz);
    renderQuiz();
  </script>
</body>

</html>
