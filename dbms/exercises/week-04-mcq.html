<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DBMS Week 4 MCQ Test | Gazi University IE</title>
  <link rel="icon" type="image/png" href="../../assets/gazi-university-logo-en.png" />
  <style>
    :root {
      --gazi-red: #c8102e;
      --gazi-deep-red: #9f0f25;
      --gazi-navy: #003366;
      --ink: #1a2a3a;
      --line: #d1dbe6;
      --panel: #ffffff;
      --ok: #1f7a3e;
      --bad: #a0142a;
      --soft-ok: #e8f7ee;
      --soft-bad: #ffecef;
      --soft-neutral: #f6f9fd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans", "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(0, 51, 102, 0.14), transparent 32%),
        radial-gradient(circle at 92% 12%, rgba(200, 16, 46, 0.14), transparent 34%),
        linear-gradient(170deg, #f8fbff 0%, #f2f7fc 58%, #edf3fa 100%);
      min-height: 100vh;
    }

    .site-header {
      background: linear-gradient(108deg, var(--gazi-red), var(--gazi-navy));
      color: #fff;
      padding: 1rem clamp(1rem, 4vw, 3.5rem);
      border-bottom: 4px solid #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .brand-wrap { display: flex; align-items: center; gap: 0.85rem; }

    .brand-logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.92);
      padding: 4px;
    }

    .brand-top,
    .term-note,
    .brand-main { margin: 0; }

    .brand-main {
      margin-top: 0.15rem;
      font-size: clamp(1.05rem, 2.4vw, 1.7rem);
      font-weight: 700;
    }

    .page-wrap {
      width: min(1100px, 92%);
      margin: 1.25rem auto 2rem;
      display: grid;
      gap: 1rem;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 22px rgba(0, 51, 102, 0.08);
    }

    .stats-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      padding: 0.95rem 1rem;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 0.6rem;
      width: min(680px, 100%);
    }

    .stat {
      border: 1px solid #d6e2f0;
      border-radius: 10px;
      background: #f8fbff;
      padding: 0.58rem 0.66rem;
      text-align: center;
    }

    .stat .label {
      display: block;
      font-size: 0.78rem;
      color: #4f5c6d;
      margin-bottom: 0.2rem;
    }

    .stat .value {
      font-weight: 700;
      font-size: 1.08rem;
      color: var(--gazi-navy);
    }

    .actions { display: flex; gap: 0.55rem; flex-wrap: wrap; }

    button,
    .back-link {
      border: 1px solid transparent;
      border-radius: 9px;
      padding: 0.56rem 0.78rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.92rem;
    }

    .btn-reset { background: var(--gazi-red); color: #fff; }
    .btn-reset:hover { background: var(--gazi-deep-red); }

    .back-link {
      background: #eaf2fb;
      color: var(--gazi-navy);
      border-color: #cad9ea;
      display: inline-flex;
      align-items: center;
    }

    .intro { padding: 1rem; line-height: 1.45; }
    .intro p { margin: 0; }

    .quiz-list {
      padding: 0.2rem 0.8rem 0.9rem;
      display: grid;
      gap: 0.8rem;
    }

    .question-card {
      border: 1px solid #dce6f2;
      border-radius: 12px;
      background: #fbfdff;
      padding: 0.85rem;
    }

    .q-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.8rem;
      margin-bottom: 0.62rem;
    }

    .q-text { margin: 0; font-weight: 700; line-height: 1.35; }

    .btn-reveal {
      background: #eff5fc;
      color: var(--gazi-navy);
      border-color: #c8d9eb;
      white-space: nowrap;
      font-weight: 600;
    }

    .opt-list {
      display: grid;
      gap: 0.42rem;
      margin-bottom: 0.58rem;
    }

    .opt {
      display: flex;
      gap: 0.5rem;
      align-items: flex-start;
      border: 1px solid #dce6f2;
      background: #fff;
      border-radius: 9px;
      padding: 0.46rem 0.56rem;
    }

    .opt input { margin-top: 0.2rem; }
    .opt.correct-opt { border-color: #8bc8a2; background: #f1fbf5; }
    .opt.wrong-opt { border-color: #e8a3b0; background: #fff4f6; }

    .feedback,
    .answer-box {
      border: 1px solid #dbe7f4;
      border-radius: 9px;
      padding: 0.5rem 0.62rem;
      background: var(--soft-neutral);
      font-size: 0.92rem;
      line-height: 1.42;
      display: none;
      margin-top: 0.52rem;
    }

    .feedback.show,
    .answer-box.show { display: block; }

    .feedback.good {
      background: var(--soft-ok);
      border-color: #a9d7b9;
      color: var(--ok);
      font-weight: 600;
    }

    .feedback.bad {
      background: var(--soft-bad);
      border-color: #e9b4bf;
      color: var(--bad);
      font-weight: 600;
    }

    .answer-box b { color: var(--gazi-navy); }
    @media (max-width: 720px) {
      .stat-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .q-head { flex-direction: column; }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="brand-wrap">
      <img class="brand-logo" src="../../assets/gazi-university-logo-en.png" alt="Gazi University logo" />
      <div>
        <p class="brand-top">Gazi University • Department of Industrial Engineering</p>
        <h1 class="brand-main">IE326 Week 4 MCQ Test</h1>
      </div>
    </div>
    <p class="term-note">Database Management Systems</p>
  </header>

  <main class="page-wrap">
    <section class="panel stats-panel">
      <div class="stat-grid">
        <div class="stat"><span class="label">Questions</span><span class="value" id="total-count">12</span></div>
        <div class="stat"><span class="label">Correct</span><span class="value" id="correct-count">0</span></div>
        <div class="stat"><span class="label">Wrong</span><span class="value" id="wrong-count">0</span></div>
        <div class="stat"><span class="label">Score (0-100)</span><span class="value" id="score-count">0</span></div>
      </div>
      <div class="actions">
        <button id="reset-btn" class="btn-reset" type="button">Reset Test</button>
        <a class="back-link" href="../index.html">Back to DBMS Page</a>
      </div>
    </section>

    <section class="panel intro">
      <p>
        This MCQ test is based on <b>dbms/slides/week4.pdf</b>. Use <b>Show Answer</b> to reveal the answer key and
        explanation.
      </p>
    </section>

    <section class="panel">
      <div class="quiz-list" id="quiz-list"></div>
    </section>
  </main>

  <script>
    const questions = [
      {
        id: 1,
        q: "In this lecture, logical design assumes that the DBMS schema model is:",
        options: ["Hierarchical", "Network", "Relational", "Object-oriented only"],
        answer: 2,
        why: "The introduction states that, within scope, the DBMS is assumed to have a relational model schema.",
        slide: 3
      },
      {
        id: 2,
        q: "Which one is listed as an important feature of relations in the relation chart?",
        options: ["Attribute order is mandatory", "Row order is unimportant", "Attributes must be plural nouns", "Every relation has multiple keys"],
        answer: 1,
        why: "The slide says both attribute order and row order are unimportant.",
        slide: 5
      },
      {
        id: 3,
        q: "During entity conversion, which attributes are moved to the new schema?",
        options: ["Only composite attributes", "Primary key and simple attributes", "Only multi-valued attributes", "All attributes without filtering"],
        answer: 1,
        why: "Entity conversion rules keep the primary key and simple attributes, while ignoring other attributes.",
        slide: 7
      },
      {
        id: 4,
        q: "For converting a 1:N binary relationship, the primary key of the '1' side is added to:",
        options: ["The '1' side again as a second key", "The N-side schema as a foreign key", "A brand-new separate schema only", "Both sides as composite attributes"],
        answer: 1,
        why: "The method adds the PK of entity A to entity B on the N side as a foreign key.",
        slide: 9
      },
      {
        id: 5,
        q: "In 1:1 conversion (mandatory/partial participation case), where should the foreign key be placed?",
        options: ["In both schemas simultaneously", "In the schema with mandatory participation", "In the schema with partial participation", "In an unrelated bridge table"],
        answer: 2,
        why: "The rule adds the PK of the mandatory-join entity to the partial-join entity as foreign key.",
        slide: 11
      },
      {
        id: 6,
        q: "In the alternative 1:1 rule based on entity counts, foreign key placement should favor:",
        options: ["The entity set with the smallest estimated size", "The entity with longest attribute names", "The table with more text columns", "The entity with no primary key"],
        answer: 0,
        why: "The lecture says to place the other entity's PK as FK in the schema of the entity set with fewer elements.",
        slide: 13
      },
      {
        id: 7,
        q: "When converting an N:M binary relationship, what must be created?",
        options: ["Only one of the original entity schemas", "An additional relationship schema", "A trigger before conversion", "A denormalized flat file"],
        answer: 1,
        why: "N:M conversion requires an additional relation carrying both foreign keys and definitional attributes.",
        slide: 15
      },
      {
        id: 8,
        q: "For weak entity conversion, the resulting primary key of the weak relation is formed from:",
        options: ["Only weak entity non-key attributes", "Strong entity PK + weak entity key part", "Only strong entity PK", "A new surrogate key only"],
        answer: 1,
        why: "The process adds the strong entity PK as FK and combines it with the weak key part to form the PK.",
        slide: 17
      },
      {
        id: 9,
        q: "The conversion of a composite attribute should map it into:",
        options: ["Its first-degree component attributes", "A single JSON attribute only", "A separate trigger table", "No schema change at all"],
        answer: 0,
        why: "Slides state composite attributes are converted by representing component attributes at first degree.",
        slide: 21
      },
      {
        id: 10,
        q: "For a multi-valued attribute, which conversion is correct?",
        options: ["Keep it inside the entity relation as repeated columns", "Create a new relation with entity PK as FK and the multi-valued attribute as key part", "Drop the attribute from design", "Convert it directly into a view only"],
        answer: 1,
        why: "The procedure creates a new relation and uses owner PK plus the multi-valued attribute as key part.",
        slide: 24
      },
      {
        id: 11,
        q: "In converting ternary/N-ary relationships, the logical schema generally includes:",
        options: ["No extra relation", "A single denormalized text field", "An additional many-to-many type relation", "Only recursive foreign keys"],
        answer: 2,
        why: "The week 4 slides state that many-to-many type ternary/N-relations require an additional relation.",
        slide: 34
      },
      {
        id: 12,
        q: "For sub/super class conversion, which statement is true?",
        options: ["Subclass tables never receive the superclass key", "Superclass table needs a discriminator attribute, and subclass tables carry superclass PK as PK/FK", "Only subclasses are stored; superclass is removed", "Subclass attributes are merged into one text column"],
        answer: 1,
        why: "The method keeps a superclass relation with discriminator and maps superclass PK into each subclass relation.",
        slide: 39
      }
    ];

    const quizList = document.getElementById("quiz-list");
    const totalCount = document.getElementById("total-count");
    const correctCount = document.getElementById("correct-count");
    const wrongCount = document.getElementById("wrong-count");
    const scoreCount = document.getElementById("score-count");
    const resetBtn = document.getElementById("reset-btn");

    const state = { selections: {} };

    function renderQuiz() {
      totalCount.textContent = String(questions.length);
      quizList.innerHTML = "";

      questions.forEach((item, idx) => {
        const card = document.createElement("article");
        card.className = "question-card";
        card.dataset.qid = String(item.id);

        const head = document.createElement("div");
        head.className = "q-head";

        const qText = document.createElement("p");
        qText.className = "q-text";
        qText.textContent = `${idx + 1}. ${item.q}`;

        const revealBtn = document.createElement("button");
        revealBtn.type = "button";
        revealBtn.className = "btn-reveal";
        revealBtn.textContent = "Show Answer";

        head.appendChild(qText);
        head.appendChild(revealBtn);

        const optList = document.createElement("div");
        optList.className = "opt-list";

        item.options.forEach((optText, optIdx) => {
          const optionLabel = document.createElement("label");
          optionLabel.className = "opt";

          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = `q-${item.id}`;
          radio.value = String(optIdx);

          const txt = document.createElement("span");
          txt.textContent = optText;

          optionLabel.appendChild(radio);
          optionLabel.appendChild(txt);
          optList.appendChild(optionLabel);
        });

        const feedback = document.createElement("div");
        feedback.className = "feedback";

        const answerBox = document.createElement("div");
        answerBox.className = "answer-box";

        revealBtn.addEventListener("click", () => {
          const correctText = item.options[item.answer];
          answerBox.innerHTML = `<b>Correct Answer:</b> ${correctText}<br><b>Why:</b> ${item.why}<br><b>Slide Reference:</b> Week4 PDF - Slide ${item.slide}`;
          answerBox.classList.add("show");
        });

        optList.addEventListener("change", (e) => {
          const target = e.target;
          if (!(target instanceof HTMLInputElement) || target.type !== "radio") return;

          const selected = Number(target.value);
          state.selections[item.id] = selected;
          updateQuestionVisual(item.id);
          updateStats();
        });

        card.appendChild(head);
        card.appendChild(optList);
        card.appendChild(feedback);
        card.appendChild(answerBox);
        quizList.appendChild(card);
      });

      updateStats();
    }

    function updateQuestionVisual(questionId) {
      const item = questions.find((q) => q.id === questionId);
      const card = quizList.querySelector(`[data-qid="${questionId}"]`);
      if (!item || !card) return;

      const selected = state.selections[questionId];
      const labels = Array.from(card.querySelectorAll(".opt"));
      const feedback = card.querySelector(".feedback");

      labels.forEach((label, idx) => {
        label.classList.remove("correct-opt", "wrong-opt");
        if (selected === idx) {
          if (idx === item.answer) label.classList.add("correct-opt");
          else label.classList.add("wrong-opt");
        }
      });

      if (!(feedback instanceof HTMLElement)) return;

      if (selected === undefined) {
        feedback.className = "feedback";
        feedback.textContent = "";
        return;
      }

      if (selected === item.answer) {
        feedback.className = "feedback show good";
        feedback.textContent = `Correct. (Slide ${item.slide})`;
      } else {
        feedback.className = "feedback show bad";
        feedback.textContent = `Wrong. Correct option is \"${item.options[item.answer]}\". (Slide ${item.slide})`;
      }
    }

    function updateStats() {
      let correct = 0;
      let wrong = 0;

      questions.forEach((item) => {
        const selected = state.selections[item.id];
        if (selected === undefined) return;
        if (selected === item.answer) correct += 1;
        else wrong += 1;
      });

      const score = Math.round((correct / questions.length) * 100);
      correctCount.textContent = String(correct);
      wrongCount.textContent = String(wrong);
      scoreCount.textContent = String(score);
    }

    function resetQuiz() {
      state.selections = {};
      quizList.querySelectorAll("input[type='radio']").forEach((el) => { el.checked = false; });
      quizList.querySelectorAll(".opt").forEach((el) => { el.classList.remove("correct-opt", "wrong-opt"); });
      quizList.querySelectorAll(".feedback").forEach((el) => { el.className = "feedback"; el.textContent = ""; });
      quizList.querySelectorAll(".answer-box").forEach((el) => { el.classList.remove("show"); el.textContent = ""; });
      updateStats();
    }

    resetBtn.addEventListener("click", resetQuiz);
    renderQuiz();
  </script>
</body>

</html>
